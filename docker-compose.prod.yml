version: "3.9"

# ── Production overrides (AWS EC2) ────────────────────────────────────────────
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:

  schoolbot:
    image: ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG:-latest}
    build: ~   # don't build locally in prod, pull from ECR
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:5432/${DB_NAME}
    logging:
      driver: "awslogs"
      options:
        awslogs-group: "/schoolbot/app"
        awslogs-region: "${AWS_REGION:-us-east-1}"
        awslogs-stream-prefix: "schoolbot"

  postgres:
    # In production, use RDS instead — remove this service and set DB_HOST to RDS endpoint
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}

  pgadmin:
    # Never run pgadmin in production
    profiles:
      - never

  caddy:
    environment:
      - DOMAIN=${DOMAIN}
