name: Build & Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub UI

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: schoolbot
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    name: Build Docker image → ECR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag & push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag  $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                      $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy to EC2 via SSH
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Pull latest image and restart the stack
            cd ~/schoolbot
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull schoolbot
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-deps schoolbot
            docker image prune -f
            echo "✅ Deploy complete"

# ── GitHub Secrets required ──────────────────────────────────────────────────
# AWS_ACCESS_KEY_ID          IAM user with ECR push permissions
# AWS_SECRET_ACCESS_KEY      IAM user secret
# EC2_HOST                   Public IP or hostname of your EC2 instance
# EC2_USER                   SSH user (e.g. ec2-user or ubuntu)
# EC2_SSH_KEY                Private key for SSH access (PEM contents)
